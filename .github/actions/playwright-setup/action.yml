name: "Playwright Environment Setup"
description: >
  Composite action that installs Node dependencies and Playwright browsers.
  Caches both node_modules and the Playwright browser binaries so subsequent
  runs skip the slow install steps.

inputs:
  npm-auth-token:
    description: "NPM auth token for private registry packages (if any)"
    required: false
    default: ""
  node-version:
    description: "Node.js version to use"
    required: false
    default: "20"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "yarn"

    - name: Configure npm auth token
      if: inputs.npm-auth-token != ''
      shell: bash
      run: |
        echo "//registry.npmjs.org/:_authToken=${{ inputs.npm-auth-token }}" > ~/.npmrc

    - name: Install dependencies
      shell: bash
      run: yarn install --frozen-lockfile

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-browsers-${{ runner.os }}-${{ hashFiles('**/package.json') }}
        restore-keys: |
          playwright-browsers-${{ runner.os }}-

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: yarn playwright install --with-deps chromium firefox

    - name: Install Playwright system dependencies only (cache hit)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      run: yarn playwright install-deps chromium firefox
